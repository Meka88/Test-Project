<!doctype html>
<html lang="en">
  <head>
    <!--
      Meticulous session recorder — MUST be the first script in <head> so it can
      capture every network request before any other script runs.

      Replace YOUR_PROJECT_ID with the Project ID from your Meticulous dashboard
      (https://app.meticulous.ai → Project Settings). The recorder only records on
      localhost and other non-production environments by default, so it is safe to
      keep here while you evaluate Meticulous.

      Docs: https://app.meticulous.ai/docs/recorder-installation
    -->
    <script
      data-project-id="YOUR_PROJECT_ID"
      src="https://snippet.meticulous.ai/v1/meticulous.js"
    ></script>

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sample Vite + React + Bun app for evaluating Meticulous.AI"
    />
    <title>Flightdeck · Meticulous Demo</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
